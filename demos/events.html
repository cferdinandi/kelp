<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Basic Setup</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style type="text/css">
		body {
			margin: 0 auto;
			max-width: 40em;
			width: 88%;
		}
	</style>
</head>
<body>

	<div id="app"></div>

	<script src="../dist/kelp.js"></script>
	<script>
		let {render} = kelp;

		// Track clicks
		let n = 0;

		// Log clicks
		function log () {
			n++;
			console.log(`Clicked ${n} times.`);
		}

		// Render a button with an onclick event
		render('#app', `<button onclick="log()">Activate Me</button>`, true);
	</script>

</body>
</html>
