<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Basic Setup</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style type="text/css">
		body {
			margin: 0 auto;
			max-width: 40em;
			width: 88%;
		}
	</style>
</head>
<body>

	<div id="app"></div>

	<script src="../dist/kelp.js"></script>
	<script>
		let {store, render} = kelp;

		// Create a reactive store
		let data = store({
			heading: 'My Todos',
			todos: ['Swim', 'Climb', 'Jump', 'Play'],
			emoji: '👋🎉'
		});

		// Create a template
		function template () {
			let {heading, todos, emoji} = data;
			return `
				<h1>${heading} ${emoji}</h1>
				<ul>
					${todos.map(function (todo) {
						return `<li id="${todo.toLowerCase().replaceAll(' ', '-')}">${todo}</li>`;
					}).join('')}
				</ul>`;
		}

		// Render the template into the UI
		render('#app', template());

		// Listen for data updates, and re-render
		document.addEventListener('kelp:store', function () {
			render('#app', template());
		});

		// After two seconds, add an item to the todo list
		setTimeout(function () {
			data.todos.push('Take a nap... zzzz');
		}, 2000);
	</script>

</body>
</html>
